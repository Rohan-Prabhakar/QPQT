name: Build wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_SKIP: "*-musllinux*"

          # manylinux_2_28 is based on AlmaLinux 8, which uses dnf/yum
          # and ships modern cmake as the 'cmake' package (not cmake3).
          # Build ninja and cmake via pip to avoid package-name drift
          # across container images.
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"

          CIBW_BEFORE_ALL_LINUX: >
            yum install -y openssl-devel git gcc gcc-c++ make &&
            pip install cmake ninja &&
            git clone --depth 1 https://github.com/open-quantum-safe/liboqs /tmp/liboqs &&
            cmake -GNinja -S /tmp/liboqs -B /tmp/liboqs/build
            -DOQS_DIST_BUILD=ON
            -DCMAKE_INSTALL_PREFIX=/usr/local
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=ON &&
            cmake --build /tmp/liboqs/build --target install

          CIBW_ENVIRONMENT_LINUX: >
            LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib
            CMAKE_PREFIX_PATH=/usr/local

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib
            auditwheel repair -w {dest_dir} {wheel}

          CIBW_TEST_COMMAND: >
            python -c "import qpqt; pub, sec = qpqt.keygen(); print('wheel OK,', len(pub), 'byte public key')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
