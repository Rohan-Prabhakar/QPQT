name: Build DuckDB Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        duckdb_version: ['v1.1.3']

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git gcc g++ cmake ninja-build libssl-dev

      - name: Build liboqs (static)
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs /tmp/liboqs
          cmake -GNinja -S /tmp/liboqs -B /tmp/liboqs/build \
            -DOQS_DIST_BUILD=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DOQS_BUILD_ONLY_LIB=ON
          sudo cmake --build /tmp/liboqs/build --target install

      - name: Clone and build DuckDB
        run: |
          git clone --depth 1 --branch ${{ matrix.duckdb_version }} \
            https://github.com/duckdb/duckdb /tmp/duckdb
          cmake -GNinja -S /tmp/duckdb -B /tmp/duckdb/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXTENSIONS='' \
            -DBUILD_UNITTESTS=OFF
          cmake --build /tmp/duckdb/build
        timeout-minutes: 30

      - name: Build QPQT DuckDB extension
        run: |
          cmake -GNinja \
            -S integrations/duckdb \
            -B build/duckdb_ext \
            -DDUCKDB_DIR=/tmp/duckdb \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/duckdb_ext

      - name: Test extension
        run: |
          cd build/duckdb_ext
          /tmp/duckdb/build/duckdb -c "
            LOAD './qpqt.duckdb_extension';
            SET qpqt_secret_key = '/tmp/test_sec.bin';
            SELECT 'extension loaded OK' AS status;
          "

      - uses: actions/upload-artifact@v4
        with:
          name: qpqt-duckdb-${{ matrix.os }}-${{ matrix.duckdb_version }}
          path: build/duckdb_ext/qpqt.duckdb_extension
